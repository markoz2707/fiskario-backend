services:
  postgres:
    image: postgres:16-alpine
    container_name: fiskario-postgres
    environment:
      POSTGRES_USER: fiskario_user
      POSTGRES_PASSWORD: fiskario_password
      POSTGRES_DB: fiskario_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fiskario_user -d fiskario_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fiskario-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: fiskario-backend
    environment:
      DATABASE_URL: postgresql://fiskario_user:fiskario_password@postgres:5432/fiskario_dev?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: development-secret-key
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
